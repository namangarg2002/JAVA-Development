<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servlet Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f0f4f8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:350px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#0d6efd;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:5px;
            background:#0d6efd;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#084fc7;
        }
    </style>
</head>
<body>

    <div class="container">

        <h2>User Registration</h2>

        <form  method="post" action="./ServletApp" >

            <label for="uname">Name</label>
            <input
                type="text"
                id="uname"
                name="uname"
                placeholder="Enter your name"
                required>

            <label for="ucity">City</label>
            <input
                type="text"
                id="ucity"
                name="ucity"
                placeholder="Enter your city"
                required>

            <button type="submit">
                Submit
            </button>

        </form>

    </div>

</body>
</html>
