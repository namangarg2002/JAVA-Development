<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:25px;
        }

        .input-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:6px;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#0d6efd;
        }

        button{
            width:100%;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#084298;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>User Registration</h2>

    <form action="./Register" method="post">

        <div class="input-group">
            <label for="uname">User Name</label>
            <input
                type="text"
                id="uname"
                name="uname"
                placeholder="Enter your name"
                required>
        </div>

        <div class="input-group">
            <label for="uemail">Email Address</label>
            <input
                type="email"
                id="uemail"
                name="uemail"
                placeholder="Enter your email"
                required>
        </div>

        <div class="input-group">
            <label for="upassword">Password</label>
            <input
                type="password"
                id="upassword"
                name="upassword"
                placeholder="Enter your password"
                required>
        </div>

        <div class="input-group">
            <label for="ucity">City</label>
            <input
                type="text"
                id="ucity"
                name="ucity"
                placeholder="Enter your city"
                required>
        </div>

        <button type="submit">
            Register
        </button>

    </form>

</div>

</body>
</html>
